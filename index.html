    to {

  function showWeeklyReport(){
    const dailyTasks = JSON.parse(localStorage.getItem("dailyTasks")) || {};
    let output = "<h4>تقرير آخر 7 أيام</h4>";

    const dates = Object.keys(dailyTasks).slice(-7);

    dates.forEach(date=>{
      output += `<strong>${date}</strong><br>`;
      dailyTasks[date].forEach(dailyTask=>{
        const status = dailyTask.checked ? "✅" : "❌";
        const pagesInfo = dailyTask.pages ? ` - ${dailyTask.pages} صفحة` : "";
        output += `&nbsp;&nbsp;${status} ${dailyTask.name}${pagesInfo}<br>`;
      });
      output += "<br>";
    });

    document.getElementById("weeklyReport").innerHTML = output;
  }

  async function exportPDF(){
    const reportElement = document.querySelector(".report-card");

    if(!reportElement){
      alert("report-card not found");
      return;
    }
    try {

      await new Promise(resolve => setTimeout(resolve, 300));

      const canvas = await html2canvas(reportElement, {
        scale: 2,
        backgroundColor: "#1b1b35",
        useCORS: true
      });

      const imgData = canvas.toDataURL("image/png");

      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF("p", "mm", "a4");

      const pageWidth = pdf.internal.pageSize.getWidth();
      const imgWidth = pageWidth - 20;
      const imgHeight = (canvas.height * imgWidth) / canvas.width;

      pdf.addImage(imgData, "PNG", 10, 10, imgWidth, imgHeight);
      pdf.save("التقرير-الشهري.pdf");

    } catch (error){
      // console.error(error);
      // alert("Error generating PDF");
      console.error("PDF ERROR:", error, window.jspdf, html2canvas);
      alert(error.message);
    }
  }

  async function fetchPrayerTimes() {

    const today = new Date();
    const timestamp = Math.floor(today.getTime() / 1000);

    return new Promise((resolve) => {

      if (!navigator.geolocation) {
        console.log("Geolocation not supported → fallback to city");
        fetchByCity(resolve);
        return;
      }

      navigator.geolocation.getCurrentPosition(
        async function(position) {

          try {
            const latitude = position.coords.latitude;
            const longitude = position.coords.longitude;

            const url = `https://api.aladhan.com/v1/timings/${timestamp}?latitude=${latitude}&longitude=${longitude}&method=5`;

            const response = await fetch(url);
            const data = await response.json();

            if (data.code !== 200) {
              console.log("API error → fallback to city");
              fetchByCity(resolve);
              return;
            }

            resolve(formatTimings(data.data.timings));

          } catch (err) {
            console.log("Fetch error → fallback to city");
            fetchByCity(resolve);
          }

        },
        function(error) {
          console.log("Permission denied → fallback to city");
          fetchByCity(resolve);
        }
      );

    });
  }

  async function fetchByCity(resolve) {
    try {
      const url = `https://api.aladhan.com/v1/timingsByCity?city=Cairo&country=Egypt&method=2`;

      const response = await fetch(url);
      const data = await response.json();

      if (data.code !== 200) {
        resolve(null);
        return;
      }

      resolve(formatTimings(data.data.timings));

    } catch (err) {
      console.log("City fetch failed");
      resolve(null);
    }
  }

  function formatTimings(timings) {
    return {
      // Maghrib: { start: cleanTime(timings.Maghrib), end: cleanTime(timings.Isha) },
      Maghrib: { start: cleanTime(timings.Maghrib), end: addMinutes(cleanTime(timings.Maghrib), 30) },
      Iftar: { start: addMinutes(cleanTime(timings.Maghrib), 30), end: addMinutes(cleanTime(timings.Maghrib), 60) },
      RestAfterIftar: { start: addMinutes(cleanTime(timings.Maghrib), 60), end: cleanTime(timings.Isha) },
      Isha: { start: cleanTime(timings.Isha), end: addMinutes(cleanTime(timings.Isha), 90) },
      Family: { start: addMinutes(cleanTime(timings.Isha), 90), end: addMinutes(cleanTime(timings.Isha), 150) },
      Gym: { start: addMinutes(cleanTime(timings.Isha), 170), end: addMinutes(cleanTime(timings.Isha), 230) },
      Quran: { start: addMinutes(cleanTime(timings.Isha), 270), end: addMinutes(cleanTime(timings.Isha), 330) },
      
      // Rest: addHours(cleanTime(timings.Isha), 6),
      Rest: { start: addMinutes(cleanTime(timings.Isha), 330), end: addHours(cleanTime(timings.Fajr), -2) },
      Suhoor: { start: addHours(cleanTime(timings.Fajr), -2), end: cleanTime(timings.Fajr) },
      // Suhoor: { start: "03:30", end: cleanTime(timings.Fajr) },
      
      Fajr: { start: cleanTime(timings.Fajr), end: addMinutes(cleanTime(timings.Fajr), 30) },
      Sleep: { start: addMinutes(cleanTime(timings.Fajr), 30), end: "10:30" },
      Work1: { start: "11:00", end: "17:00" },
      Dhuhr: { start: cleanTime(timings.Dhuhr), end: addMinutes(cleanTime(timings.Dhuhr), 20) },
      // Work2: { start: "13:30", end: "17:00" },
      Work2: { start: addMinutes(cleanTime(timings.Dhuhr), 20), end: cleanTime(timings.Asr) },
      Asr: { start: cleanTime(timings.Asr), end: addMinutes(cleanTime(timings.Asr), 30) },
      // Work3: { start: "13:30", end: "17:00" }
      Work3: { start: addMinutes(cleanTime(timings.Asr), 20), end: "17:00" },
      };
  }

  function addMinutes(timeStr, minutesToAdd) {
    const [hours, minutes] = timeStr.split(":").map(Number);

    const date = new Date();
    date.setHours(hours);
    date.setMinutes(minutes + minutesToAdd);
    date.setSeconds(0);

    const newHours = String(date.getHours()).padStart(2, "0");
    const newMinutes = String(date.getMinutes()).padStart(2, "0");

    return `${newHours}:${newMinutes}`;
  }

  function addHours(timeStr, hoursToAdd) {
    return addMinutes(timeStr, hoursToAdd * 60);
  }

  function getCurrentTask(){
    if(!tasks || tasks.length === 0) return "جاري التحميل... 🌙";

    const now = new Date();
    const currentMinutes = now.getHours()*60 + now.getMinutes();

    for(let t of tasks){
      let start = t.time.start;
      let end = t.time.end;

      // لو الوقت مجرد string (مثل المغرب من API)
      if(typeof start === "string") start = start.split(" ")[0];
      if(typeof end === "string") end = end.split(" ")[0];

      const [sh,sm] = start.split(":").map(Number);
      const [eh,em] = end.split(":").map(Number);

      const startMin = sh*60 + sm;
      const endMin = eh*60 + em;

      if(currentMinutes >= startMin && currentMinutes < endMin){
        return t.name;
      }
    }

    return "استمتع بيومك 🌙";
  }

    function getDragAfterElement(container, y) {
    const draggableElements = [
      ...container.querySelectorAll(".task-item:not(.dragging)")
    ];

    let closest = null;
    let closestOffset = Number.NEGATIVE_INFINITY;

    draggableElements.forEach(child => {
      const box = child.getBoundingClientRect();
      const offset = y - (box.top + box.height / 2);

      if (offset < 0 && offset > closestOffset) {
        closestOffset = offset;
        closest = child;
      }
    });

    return closest;
  }

  function enableSwipe(){

    let startY = 0;
    let currentItem = null;
    let isDragging = false;

    // if(!container.classList.contains("show")) return;
    container.addEventListener("pointerdown", (e)=>{

      document.getElementById("currentTask").textContent = "Pointer Down";
      const item = e.target.closest(".task-item");
      if(!item) return;

      currentItem = item;
      startY = e.clientY;
      isDragging = true;

      currentItem.style.transition = "none";
      currentItem.setPointerCapture(e.pointerId);  // 🔥 دي أهم سطر
    });

    container.addEventListener("pointermove", (e)=>{
      if(!isDragging || !currentItem) return;

      console.log("Pointer Move");
      
      const diff = e.clientY - startY;
      // document.getElementById("currentTask").textContent = "Pointer Move: " + e.clientY + " - " + startY + " = " + diff;
      currentItem.style.transform = `translateY(${diff}px)`;

      // خلفية أثناء السحب
      if(diff > 0){
        currentItem.style.background = "#1f6f3e"; // أخضر
        // currentItem.style.transform = "translateX(100%)";
        // setTimeout(()=> editTaskTime(index, diff), 0);
        // editTaskTime(index, diff);
        
      } else {

        // currentItem.style.transform = "translateX(-100%)";
        // setTimeout(()=> deleteTask(index), 200);
      }
    });

    
    container.addEventListener("pointerup", (e)=>{
      if(!currentItem) return;
  
      console.log("Pointer Up");
      document.getElementById("currentTask").textContent = "Pointer Up";
      currentItem.releasePointerCapture(e.pointerId); // 🔥 مهم جدًا
      const diff = e.clientY - startY;
      const index = [...container.children].indexOf(currentItem);

      currentItem.style.transition = "0.3s";

      // if(diff > 60){
      //   // editTaskTime(index); // swipe right
      //   currentItem.style.transform = "translateX(100%)";
      //   setTimeout(()=> editTaskTime(index, diff), 200);
      // }
      // else if(diff < -60){
      //   // deleteTask(index);   // swipe left
      //   currentItem.style.transform = "translateX(-100%)";
      //   setTimeout(()=> deleteTask(index), 200);
      // }

      e.preventDefault();
      // const dragging = document.querySelector(".dragging");
      const afterElement = getDragAfterElement(container, e.clientY);

      if(afterElement == null){
        container.appendChild(currentItem);
      } else {
        container.insertBefore(currentItem, afterElement);
      }

      // container.addEventListener("dragover", e=>{

      // رجوع طبيعي
      currentItem.style.transform = "translateX(0)";
      currentItem.style.background = "#2e2e50";

      isDragging = false;
      currentItem = null;
    });

    container.addEventListener("pointercancel", ()=>{
      isDragging = false;
      if(currentItem){
        currentItem.style.transform = "translateX(0)";
        currentItem = null;
        // new Error("Pointer Cancelled").message = "Pointer Cancelled";

      }
    });

  function enableInteractions() {

    const container = document.getElementById("sideChecklist");
    const items = document.querySelectorAll(".task-item");

    items.forEach(item => {

      let startX = 0;
      let startY = 0;
      let currentX = 0;
      let currentY = 0;
      let isDragging = false;
      let isSwiping = false;

      item.addEventListener("pointerdown", (e) => {

        if(e.target.tagName === "INPUT") return;
        
        startX = e.clientX;
        startY = e.clientY;

        item.setPointerCapture(e.pointerId);

        currentX = 0;
        currentY = 0;

        item.style.transition = "none";

      });

      item.addEventListener("pointermove", (e) => {

        if (startX === 0 && startY === 0) return;

        currentX = e.clientX - startX;
        currentY = e.clientY - startY;

        // تحديد الاتجاه
        if (!isDragging && !isSwiping) {

          if (Math.abs(currentX) > 8 && Math.abs(currentX) > Math.abs(currentY)) {
            isSwiping = true;
          }

          if (Math.abs(currentY) > 8 && Math.abs(currentY) > Math.abs(currentX)) {
            isDragging = true;
            item.classList.add("dragging");
          }
        }

        if (isSwiping) {
          item.style.transform = `translateX(${currentX}px)`;
        }

        if (isDragging) {
          item.style.transform = `translateY(${currentY}px)`;

          const afterElement = getDragAfterElement(container, e.clientY);
          if (afterElement == null) {
            container.appendChild(item);
          } else {
            container.insertBefore(item, afterElement);
          }
        }

      });

      item.addEventListener("pointerup", (e) => {

        item.releasePointerCapture(e.pointerId);

        item.style.transition = "transform 0.2s ease";

        // Swipe Actions
        if (isSwiping) {
          if (currentX > 60) {
            editTask(item.dataset.id);
          } else if (currentX < -60) {
            deleteTask(item.dataset.id);
          }
        }

        // Drag Action
        if (isDragging) {
          updateOrder();
        }

        // Reset
        item.style.transform = "";
        item.classList.remove("dragging");

        startX = 0;
        startY = 0;
        isDragging = false;
        isSwiping = false;
      });

    });
  }
